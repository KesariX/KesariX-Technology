    <!-- Structured Data (JSON-LD) - Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "KesariX Technology",
        "url": "https://www.kesarixtechnology.com/",

          "@type": "PostalAddress",
          "addressCountry": "IN"
        },
        "contactPoint": {
          "@type": "ContactPoint",

          "email": "hello@kesarixtechnology.com"
        },
        "sameAs": [
          "https://linkedin.com/company/kesarix-technology",
          "https://twitter.com/kesarix_tech"
        ]
      }
    </script>

    <!-- Structured Data (JSON-LD) - WebSite -->
